<!doctype html>
<html lang="zh-CN">
  <head>
    <meta charset="utf-8" />
    <!-- <meta name="referrer" content="never"> -->
    <title>Yuezun Li's Homepage</title>
    <link
      rel="stylesheet"
      href="https://maxcdn.bootstrapcdn.com/bootstrap/3.2.0/css/bootstrap.min.css"
    />

    <meta name="author" content="Yuezun Li" />
    <meta name="viewport" content="width=device-width, initial-scale=1" />

    <link href="css/bootstrap.min.css" rel="stylesheet" />
    <link href="css/bootstrap1.min.css" rel="stylesheet" />
    <link href="css/bootstrap-responsive.min.css" rel="stylesheet" />
    <link href="css/theme.css" rel="stylesheet" />
    <link
      rel="stylesheet"
      href="https://cdn.jsdelivr.net/gh/jpswalsh/academicons@1/css/academicons.min.css"
    />
    <link
      rel="stylesheet"
      href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.1/css/all.min.css"
    />
    <link rel="icon" type="image/jpg" href="images/src_img/icon.jpg" />
    <link
      href="https://fonts.googleapis.com/css2?family=Orbitron:wght@700&display=swap"
      rel="stylesheet"
    />
    <script src="https://code.jquery.com/jquery-3.6.0.min.js?v=1"></script>
  </head>

  <body>
    <div class="container">
      <div id="site-header"></div>

      <div class="col-md-12">
        <p class="author-note-center">
          # Corresponding author · * Equal contribution
        </p>
        <!-- <hr /> -->
        <div class="tabs">
          <input type="radio" name="tab" id="tab1" checked />
          <label for="tab1" class="tab-btn">Selected</label>

          <input type="radio" name="tab" id="tab2" />
          <label for="tab2" class="tab-btn">All by date</label>

          <div class="tab-content" id="content1">
            <div id="papers-selected"></div>
          </div>
          <div class="tab-content" id="content2">
            <div>
              <select id="yearNav" onchange="jumpToYear(this.value)">
                <option value="">Jump to Year</option>
                <option value="year2026">2026</option>
                <option value="year2025">2025</option>
                <option value="year2024">2024</option>
                <option value="year2023">2023</option>
                <option value="year2022">2022</option>
                <option value="year2021">2021></option>
              </select>
            </div>

            <div id="papers-container"></div>
          </div>
        </div>
      </div>
    </div>
    <hr />
    <div class="container-fluid">
      <p style="text-align: center">
        <a href="https://clustrmaps.com/site/1bcyj" title="Visit tracker"
          ><img
            src="//clustrmaps.com/map_v2.png?cl=ffffff&w=a&t=m&d=OuDVjBphuIV15vb_K9-k4Nnidvdol9qiwaJ6-fy4sXQ"
        /></a>
      </p>
      <!-- <script type="text/javascript" id="clstr_globe" src="//clustrmaps.com/globe.js?d=-yCBFYKb96-8yFOkGerGi6ZdI4cxXiZdFXRKfDr9owM"></script> -->
      <p style="text-align: center">&copy; VAS-Lab</p>
    </div>

    <!-- Javascript files -->
    <script src="js/header.js"></script>
    <script src="js/jquery-1.9.1.min.js"></script>
    <script src="js/bootstrap.min.js"></script>
    <script>
      $("#main-carousel").carousel();
    </script>

    <script>
      document.querySelectorAll(".nav-menu a").forEach((link) => {
        if (link.href === window.location.href) {
          link.classList.add("active");
        }
      });
    </script>

    <script>
      const toggleBtn = document.querySelector(".nav-toggle");
      const navMenu = document.querySelector(".nav-menu");
      toggleBtn.addEventListener("click", () => {
        navMenu.classList.toggle("show");
      });
    </script>

    <script>
      function jumpToYear(yearId) {
        if (!yearId) return;

        const target = document.getElementById(yearId);
        if (!target) return;

        const offset = 60; // ← 你的header高度
        const elementPosition = target.getBoundingClientRect().top;
        const offsetPosition = window.pageYOffset + elementPosition - offset;

        window.scrollTo({
          top: offsetPosition,
          behavior: "smooth",
        });
      }
    </script>

    <script>
      /* =========================
     Citation 初始化函数
  ========================== */

      function loadCitations() {
        $.getJSON(
          "https://cdn.jsdelivr.net/gh/yuezunli/yuezunli.github.io@google-scholar-stats/gs_data.json",

          function (data) {
            var citationEles = document.getElementsByClassName(
              "show_paper_citations",
            );

            Array.prototype.forEach.call(citationEles, (element) => {
              var paperId = element.getAttribute("data");

              try {
                var numCitations =
                  data["publications"][paperId]["num_citations"];
              } catch (err) {
                console.error("Citation Error:", err);
                return;
              }

              element.innerHTML = "Citations: " + numCitations;

              if (numCitations > 100) {
                element.style.color = "red";
              }
            });
          },
        );
      }

      fetch("./publications.json")
        .then((res) => {
          if (!res.ok) {
            throw new Error(`HTTP Error: ${res.status}`);
          }
          return res.json();
        })

        .then((data) => {
          const container = document.getElementById("papers-container");

          data.forEach((section) => {
            /* ===== 年份标题 ===== */
            const yearTitle = document.createElement("h4");
            yearTitle.className = "subhead";
            yearTitle.id = `year${section.year}`;

            yearTitle.innerHTML = `
        <i class="fa fa-calendar" aria-hidden="true"></i>
        &nbsp;${section.year}&nbsp;
      `;

            container.appendChild(yearTitle);

            /* ===== 论文 ===== */
            section.papers.forEach((p) => {
              const paper = document.createElement("div");
              paper.className = "paper-item";

              paper.innerHTML = `
          <div class="paper-image">
            <div class="img-box">
              <img src="${p.image}" alt="${p.title}" />
            </div>
          </div>

          <div class="paper-info">
            <p>

              <a href="${p.paper || "#"}" target="_blank">

                <papertitle>
                  ${p.title}
                </papertitle>

              </a>

              <br />

              ${p.authors}

              <br />
              
              ${p.venue}

              <br />

              ${
                p.code
                  ? `
                <a
                  class="badge1 badge-code"
                  href="${p.code}"
                  target="_blank"
                >
                  <i class="fa-brands fa-github"></i>
                  Code
                </a>
              `
                  : ""
              }

              ${
                p.scholar
                  ? `
                <span class="badge1 badge-cite">
                  <i class="fa-brands fa-google-scholar"></i>

                  <span
                    class="show_paper_citations"
                    data="${p.scholar}"
                  ></span>

                </span>
              `
                  : ""
              }

            </p>
          </div>
        `;

              container.appendChild(paper);
            });
          });
          /* =========================
         关键：
         DOM插入完后再加载citation
      ========================== */

          loadCitations();
        })

        .catch((err) => {
          console.error("Failed to load publications.json");
          console.error(err);
        });
    </script>

    <script>

         Citation 初始化函数
      ========================== */

      function loadCitations() {
        $.getJSON(
          "https://cdn.jsdelivr.net/gh/yuezunli/yuezunli.github.io@google-scholar-stats/gs_data.json",

          function (data) {
            var citationEles = document.getElementsByClassName(
              "show_paper_citations",
            );

            Array.prototype.forEach.call(citationEles, (element) => {
              var paperId = element.getAttribute("data");

              try {
                var numCitations =
                  data["publications"][paperId]["num_citations"];
              } catch (err) {
                console.error("Citation Error:", err);
                return;
              }

              element.innerHTML = "Citations: " + numCitations;

              if (numCitations > 100) {
                element.style.color = "red";
              }

      fetch("./publications.json")
        .then((res) => {
          if (!res.ok) {
            throw new Error(`HTTP Error: ${res.status}`);
          }
          return res.json();
        })

        .then((data) => {
          const container = document.getElementById("papers-selected");

          data.forEach((section) => {
            /* ===== 论文 ===== */
            section.papers.forEach((p) => {
              // 只显示 selected == 1 的论文
              if (p.selected === 1) {
                const paper = document.createElement("div");
                paper.className = "paper-item";

                paper.innerHTML = `
            <div class="paper-image">
              <div class="img-box">
                <img src="${p.image}" alt="${p.title}" />

            <div class="paper-info">

                ${p.authors}

                ${p.venue}

                <br />

                ${
                  p.code
                    ? `
                  <a
                    class="badge1 badge-code"
                    href="${p.code}"
                    target="_blank"
                  >
                    <i class="fa-brands fa-github"></i>
                    Code
                  </a>
                `
                    : ""
                }

                ${
                  p.scholar
                    ? `
                  <span class="badge1 badge-cite">
                    <i class="fa-brands fa-google-scholar"></i>

                    <span
                      class="show_paper_citations"
                      data="${p.scholar}"
                    ></span>

                  </span>
                `
                    : ""
                }

              </p>
            </div>
          `;

                container.appendChild(paper);
              }
            });
          });

          // DOM插入完后再加载citation
          loadCitations();
        })

        .catch((err) => {
          console.error("Failed to load publications.json");
          console.error(err);
        });
    </script>
  </body>
</html>
